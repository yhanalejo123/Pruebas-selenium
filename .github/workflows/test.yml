name: Test Backend & Frontend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      working-directory: backend
      run: npm ci
    
    - name: Run tests
      working-directory: backend
      run: npm run test:integration
      continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
    
    - name: Build
      working-directory: frontend
      run: npm run build
      continue-on-error: true

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: success()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Install dependencies
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci
    
    - name: Start backend
      working-directory: backend
      run: npm start > server.log 2>&1 &
    
    - name: Start frontend
      working-directory: frontend
      run: npm run dev > frontend.log 2>&1 &
    
    - name: Wait for services
      run: sleep 10
    
    - name: Run E2E tests
      working-directory: backend
      env:
        CI: true
      run: npm run test:e2e
      continue-on-error: true
    
    - name: Show server logs
      if: failure()
      working-directory: backend
      run: cat server.log || true
    
    - name: Show frontend logs
      if: failure()
      working-directory: frontend
      run: cat frontend.log || true

